# Mixed Pluto/Charon peer connectivity test.
#
# Each node's image is independently configurable via NODE{N}_IMAGE env vars.
# Default is Pluto for all nodes. Override per-node to mix implementations:
#
#   NODE2_IMAGE=obolnetwork/charon:latest NODE3_IMAGE=obolnetwork/charon:latest \
#     docker compose -f docker-compose.mixed-peers-test.yml up
#
# Network topology — relay bridges isolated node networks; nodes share
# nodes_net for direct connections:
#
#   relay ── node0_net ── node0 ──┐
#         ── node1_net ── node1 ──┤ nodes_net
#         ── node2_net ── node2 ──┤ (direct connections)
#         ── node3_net ── node3 ──┘
#
# Override relay or image tag:
#   PLUTO_IMAGE=nethermindeth/pluto:1.7.1 docker compose -f docker-compose.mixed-peers-test.yml up
#
# Reset cluster data and start fresh:
#   docker compose -f docker-compose.mixed-peers-test.yml down -v

name: pluto-mixed-peers-test

services:
  setup:
    image: ${PLUTO_IMAGE:-nethermindeth/pluto:main}
    command:
      - create
      - cluster
      - --nodes=4
      - --num-validators=1
      - --threshold=3
      - --network=hoodi
      - --cluster-dir=/cluster
      - --fee-recipient-addresses=0x0000000000000000000000000000000000000001
      - --withdrawal-addresses=0x0000000000000000000000000000000000000001
    volumes:
      - cluster-data:/cluster

  fix-perms:
    image: busybox
    command: chmod -R a+rX /cluster
    volumes:
      - cluster-data:/cluster
    depends_on:
      setup:
        condition: service_completed_successfully

  relay:
    image: ${PLUTO_IMAGE:-nethermindeth/pluto:main}
    command:
      - relay
      - --http-address=0.0.0.0:3640
      - --p2p-tcp-address=0.0.0.0:3610
      - --p2p-udp-address=0.0.0.0:3630
      - --p2p-advertise-private-addresses
      - --data-dir=/cluster/relay
    depends_on:
      fix-perms:
        condition: service_completed_successfully
    volumes:
      - cluster-data:/cluster
    networks:
      - node0_net
      - node1_net
      - node2_net
      - node3_net

  node0:
    image: ${NODE0_IMAGE:-nethermindeth/pluto:main}
    command:
      - alpha
      - test
      - peers
      - --lock-file=/cluster/node0/cluster-lock.json
      - --private-key-file=/cluster/node0/charon-enr-private-key
      - --p2p-tcp-address=0.0.0.0:3610
      - --p2p-relays=http://relay:3640
      - --timeout=5m
      - --load-test-duration=30s
      - --keep-alive=5m
    depends_on:
      relay:
        condition: service_started
    volumes:
      - cluster-data:/cluster
    networks:
      - node0_net
      - nodes_net

  node1:
    image: ${NODE1_IMAGE:-nethermindeth/pluto:main}
    command:
      - alpha
      - test
      - peers
      - --lock-file=/cluster/node1/cluster-lock.json
      - --private-key-file=/cluster/node1/charon-enr-private-key
      - --p2p-tcp-address=0.0.0.0:3610
      - --p2p-relays=http://relay:3640
      - --timeout=5m
      - --load-test-duration=30s
      - --keep-alive=5m
    depends_on:
      relay:
        condition: service_started
    volumes:
      - cluster-data:/cluster
    networks:
      - node1_net
      - nodes_net

  node2:
    image: ${NODE2_IMAGE:-nethermindeth/pluto:main}
    command:
      - alpha
      - test
      - peers
      - --lock-file=/cluster/node2/cluster-lock.json
      - --private-key-file=/cluster/node2/charon-enr-private-key
      - --p2p-tcp-address=0.0.0.0:3610
      - --p2p-relays=http://relay:3640
      - --timeout=5m
      - --load-test-duration=30s
      - --keep-alive=5m
    depends_on:
      relay:
        condition: service_started
    volumes:
      - cluster-data:/cluster
    networks:
      - node2_net
      - nodes_net

  node3:
    image: ${NODE3_IMAGE:-nethermindeth/pluto:main}
    command:
      - alpha
      - test
      - peers
      - --lock-file=/cluster/node3/cluster-lock.json
      - --private-key-file=/cluster/node3/charon-enr-private-key
      - --p2p-tcp-address=0.0.0.0:3610
      - --p2p-relays=http://relay:3640
      - --timeout=5m
      - --load-test-duration=30s
      - --keep-alive=5m
    depends_on:
      relay:
        condition: service_started
    volumes:
      - cluster-data:/cluster
    networks:
      - node3_net
      - nodes_net

networks:
  node0_net:
    driver: bridge
  node1_net:
    driver: bridge
  node2_net:
    driver: bridge
  node3_net:
    driver: bridge
  nodes_net:
    driver: bridge

volumes:
  cluster-data:
