global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Cluster-health alert rules (the smoke oracle). Any firing alert = unhealthy run.
rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: 'local-exporter'
    static_configs:
      - targets: ['host.docker.internal:9464', 'host.docker.internal:9465', 'host.docker.internal:9466']
        labels:
          instance: 'local-exporter'
          environment: 'dev'