# https://embarkstudios.github.io/cargo-deny/index.html

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-unknown-linux-musl" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "wasm32-unknown-unknown" },
    { triple = "wasm32-wasi" },
    { triple = "aarch64-linux-android" },
    { triple = "aarch64-apple-ios" },
]
all-features = true
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # `hickory-proto` 0.26.1 exists, but current latest `libp2p` (0.56.0)
    # still pins `libp2p-dns` / `libp2p-mdns` to Hickory 0.25.2. Pluto does not
    # enable Hickory DNSSEC validation. Remove once libp2p moves to fixed Hickory.
    { id = "RUSTSEC-2026-0118", reason = "transitive hickory-proto 0.25.2 via latest libp2p DNS/mDNS; DNSSEC validation path not enabled by Pluto" },
    # Same pinned `libp2p` DNS/mDNS stack as above. Cargo cannot select
    # `hickory-proto` 0.26.1 until the libp2p crates relax their 0.25.2 pins.
    { id = "RUSTSEC-2026-0119", reason = "transitive hickory-proto 0.25.2 via latest libp2p DNS/mDNS; fixed hickory exists but libp2p still pins 0.25.2" },
]
unmaintained = "workspace"

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSD-2-Clause-Patent",
    "CC-BY-1.0",
    "CC-BY-2.0",
    "CC-BY-3.0",
    "CC-BY-4.0",
    "CC0-1.0",
    "CDLA-Permissive-1.0",
    "CDLA-Permissive-2.0",
    "FTL",
    "ISC",
    "JSON",
    "MIT",
    "MS-PL",
    "OpenSSL",
    "PostgreSQL",
    "SHL-0.5",
    "SHL-0.51",
    "TCP-wrappers",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "UPL-1.0",
    "W3C-20150513",
    "WTFPL",
    "Xnet",
    "Zlib",
]
exceptions = [{ crate = "attohttpc", allow = ["MPL-2.0"] }, { crate = "dyn-eq", allow = ["MPL-2.0"] }]
confidence-threshold = 0.8
unused-allowed-license = "allow"

[licenses.private]
ignore = true
registries = []

[bans]
wildcards = "deny"
allow-wildcard-paths = true
multiple-versions = "warn"
highlight = "all"

[bans.workspace-dependencies]
duplicates = 'deny'
unused = 'deny'

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    "https://github.com/matter-labs/vise",
]

[sources.allow-org]
github = ["NethermindEth"]
gitlab = []
bitbucket = []
